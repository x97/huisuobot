
[program:${PROJECT_NAME}_telegram]
command=${VENV_DIR}/bin/python ${PROJECT_DIR}/manage.py runbot
directory=${PROJECT_DIR}
user=${SYSTEM_USER}
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/${PROJECT_NAME}_telegram.log
stderr_logfile=/var/log/supervisor/${PROJECT_NAME}_telegram_error.log
environment=PYTHONPATH="${PROJECT_DIR}"

[program:${PROJECT_NAME}_web]
command=${VENV_DIR}/bin/gunicorn ${PROJECT_NAME}.wsgi:application --bind 0.0.0.0:8001
directory=${PROJECT_DIR}
user=${SYSTEM_USER}
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/${PROJECT_NAME}_web.log
stderr_logfile=/var/log/supervisor/${PROJECT_NAME}_web_error.log
environment=PYTHONPATH="${PROJECT_DIR}"


[program:huisuobot_celery_worker]
directory=/var/www/huisuobot
command=/var/www/huisuobot/venv/bin/celery -A huisuobot worker -l info
user=www-data
numprocs=1
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/huisuobot_celery_worker.log
stderr_logfile=/var/log/supervisor/huisuobot_celery_worker_error.log
environment=PYTHONPATH="/var/www/huisuobot",DJANGO_SETTINGS_MODULE="huisuobot.settings"


[program:huisuobot_celery_beat]
directory=/var/www/huisuobot
command=/var/www/huisuobot/venv/bin/celery -A huisuobot beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
user=www-data
numprocs=1
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/huisuobot_celery_beat.log
stderr_logfile=/var/log/supervisor/huisuobot_celery_beat_error.log
environment=PYTHONPATH="/var/www/huisuobot",DJANGO_SETTINGS_MODULE="huisuobot.settings"